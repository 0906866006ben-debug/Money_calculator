name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
    paths:
      - "android-widget/**"
      - ".github/workflows/build-android-apk.yml"

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.3.1"

      - name: Install Android SDK packages
        run: |
          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          fi
          "$SDKMANAGER" --version
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" "platforms;android-36" "build-tools;36.0.0"

      - name: Build debug APK
        run: gradle -p android-widget :app:assembleDebug --stacktrace

      - name: Prepare APK artifact
        run: |
          mkdir -p dist
          cp android-widget/app/build/outputs/apk/debug/app-debug.apk dist/MoneyCalculatorWidget-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MoneyCalculatorWidget-debug-apk
          path: dist/MoneyCalculatorWidget-debug.apk
          if-no-files-found: error
          retention-days: 30

      - name: Publish APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/MoneyCalculatorWidget-debug.apk \
            --repo "${GITHUB_REPOSITORY}" \
            --title "MoneyCalculatorWidget ${GITHUB_REF_NAME}" \
            --notes "Android desktop widget APK. Debug-signed for personal installation."
